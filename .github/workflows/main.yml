name: CI/CD Pipeline

on:
  push:
    tags:
      - 'v*' 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Necessário para enviar a imagem para o GitHub Packages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep '^version =' pyproject.toml | cut -d '"' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # 2. Transforma o nome do usuário em letras minúsculas (Correção do Erro)
      - name: Set lower case owner name
        id: set_owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: "${{ github.repository_owner }}"

      # 3. Login no Registro de Containers do GitHub (GHCR)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Build e Push da Imagem Docker
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/fastapi-lab:${{ steps.get_version.outputs.VERSION }}
            ghcr.io/${{ env.OWNER_LC }}/fastapi-lab:latest